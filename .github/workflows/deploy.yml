name: Deploy DRSOSystem

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Atualizar código na VPS
        shell: powershell
        run: |
          cd C:\DRSOSystem\DRSOSystem
          git fetch origin main
          git reset --hard origin/main

      - name: Instalar dependências
        shell: powershell
        run: |
          cd C:\DRSOSystem\DRSOSystem
          npm install

      - name: Reiniciar DRSOSystem
        shell: powershell
        run: |
          schtasks /End /TN "DRSOSystem"
          Start-Sleep -Seconds 3
          schtasks /Run /TN "DRSOSystem"
          Start-Sleep -Seconds 5

      - name: Verificar sistema
        shell: powershell
        run: |
          $response = Invoke-WebRequest -Uri "http://127.0.0.1" -UseBasicParsing -TimeoutSec 15
          if ($response.StatusCode -ne 200) {
            throw "DRSOSystem não respondeu HTTP 200"
          }
          Write-Host "Deploy concluído com sucesso."