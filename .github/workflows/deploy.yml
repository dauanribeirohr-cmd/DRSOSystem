name: Deploy DRSOSystem

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Atualizar repositorio da VPS
        shell: powershell
        run: |
          cd C:\DRSOSystem\DRSOSystem
          git fetch origin main
          git reset --hard origin/main

      - name: Executar deploy na VPS
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File C:\DRSOSystem\DRSOSystem\deploy\deploy.ps1